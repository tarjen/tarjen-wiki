<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加比赛 — Wiki Editor</title>
  <link rel="stylesheet" href="../assets/wiki.css">
  <script src="../assets/wiki.js" defer></script>
  <style>
    /* 编辑器特有：max-width、cells、cycle-hint、stat-grid、save-panel 等 */
    body { max-width: 860px; }

    .card {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 1.2em 1.4em;
      box-shadow: var(--shadow);
      margin-top: 1em;
    }
    label { display: block; margin-top: 1em; font-weight: 500; }
    label .hint { font-weight: 400; color: var(--muted); font-size: 0.88em; }
    input[type="text"], input[type="number"], input[type="date"] {
      width: 100%;
      padding: 0.55em 0.7em;
      font-size: 1em;
      font-family: inherit;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    .row { display: flex; gap: 1em; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 140px; }

    /* 题目格子 */
    .cells {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(3em, 1fr));
      gap: 6px;
      margin-top: 0.5em;
    }
    .cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-weight: bold;
      font-size: 1em;
      user-select: none;
      transition: all 0.1s;
      background: var(--card-bg);
      color: var(--muted);
      position: relative;
    }
    .cell-label {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 0.55em;
      font-weight: 400;
      color: var(--muted);
      opacity: 0.6;
    }
    .cell:hover { transform: scale(1.05); border-color: var(--accent); }
    .cell.s-O { background: var(--c-O); color: white; border-color: var(--c-O); }
    .cell.s-O .cell-label { color: rgba(255,255,255,0.8); opacity: 1; }
    .cell.s-fix { background: var(--c-fix); color: white; border-color: var(--c-fix); }
    .cell.s-fix .cell-label { color: rgba(255,255,255,0.8); opacity: 1; }
    .cell.s-bang { background: var(--c-try); color: white; border-color: var(--c-try); }
    .cell.s-bang .cell-label { color: rgba(255,255,255,0.8); opacity: 1; }

    .cycle-hint {
      display: flex;
      gap: 0.5em;
      align-items: center;
      margin-top: 0.5em;
      flex-wrap: wrap;
      font-size: 0.9em;
      color: var(--muted);
    }
    .cycle-step {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      padding: 0.2em 0.5em;
      background: var(--code-bg);
      border-radius: 4px;
      font-family: "JetBrains Mono", monospace;
    }
    .cycle-arrow { color: var(--accent); font-weight: bold; }

    .preview {
      background: var(--code-bg);
      padding: 1em;
      border-radius: 4px;
      font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-size: 0.85em;
      white-space: pre-wrap;
      word-break: break-all;
      border: 1px solid var(--border);
      max-height: 200px;
      overflow-y: auto;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6em;
      margin-top: 1em;
    }
    .stat-cell {
      background: var(--code-bg);
      border-radius: 6px;
      padding: 0.7em 0.5em;
      text-align: center;
    }
    .stat-label {
      font-size: 0.78em;
      color: var(--muted);
      margin-bottom: 0.2em;
    }
    .stat-value {
      font-size: 1.6em;
      font-weight: 600;
      color: var(--fg);
      font-family: "JetBrains Mono", monospace;
    }
    .stat-cell:nth-child(1) .stat-value { color: var(--c-O); }
    .stat-cell:nth-child(2) .stat-value { color: var(--c-fix); }

    .save-panel { border-left: 3px solid var(--c-O); }
    .save-actions {
      display: flex;
      gap: 0.5em;
      margin-top: 1em;
      flex-wrap: wrap;
    }
    .save-actions .btn.primary {
      font-size: 1.05em;
      padding: 0.7em 1.4em;
      font-weight: 600;
    }
    .diff-old { background: #fbe9e7; border-left: 3px solid #e57373; }
    .diff-new { background: #e8f5e9; border-left: 3px solid #66bb6a; }
    @media (prefers-color-scheme: dark) {
      .diff-old { background: rgba(229, 115, 115, 0.12); }
      .diff-new { background: rgba(102, 187, 106, 0.12); }
    }

    /* 编辑器按钮：原版有更大 padding 和外边距 */
    button.btn {
      padding: 0.65em 1.3em;
      font-size: 1em;
      margin-right: 0.5em;
      margin-top: 0.5em;
    }
  </style>
</head>
<body>
  <h1>📝 添加比赛</h1>

  <div class="nav-tip" id="mode-banner">
    <strong>流程：</strong>填表 → 点格子 → 点底部「💾 保存到 GitHub」自动提交，几秒后页面更新
  </div>

  <div class="edit-banner" id="edit-banner" style="display:none;">
    ✏️ 正在编辑：<strong id="editing-name"></strong>
    <span class="hint">改完直接点「💾 保存到 GitHub」即可</span>
    <button class="btn sec tiny" id="btn-exit-edit" style="float:right;">+ 改成新增模式</button>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label>比赛名</label>
        <input type="text" id="name" placeholder="2024 ICPC Asia Taichung">
      </div>
      <div>
        <label>Slug <span class="hint">（自动从比赛名生成）</span></label>
        <input type="text" id="slug" placeholder="2024-icpc-asia-taichung">
      </div>
    </div>

    <div class="row">
      <div>
        <label>日期</label>
        <input type="date" id="date">
      </div>
      <div>
        <label>题目数</label>
        <input type="number" id="total" value="13" min="1" max="26">
      </div>
      <div>
        <label>通过数 <span class="hint">（自动算：O + Ø）</span></label>
        <input type="number" id="solved" value="0" min="0" readonly style="opacity:0.6">
      </div>
    </div>
  </div>

  <div class="card">
    <label>题目状态 <span class="hint">（点格子循环：未做 → O → Ø → ! → 未做）</span></label>

    <div class="cycle-hint">
      <span class="cycle-step">· 未做</span>
      <span class="cycle-arrow">→</span>
      <span class="cycle-step" style="color: var(--c-O); font-weight: bold;">O 赛时过题</span>
      <span class="cycle-arrow">→</span>
      <span class="cycle-step" style="color: var(--c-fix); font-weight: bold;">Ø 补过</span>
      <span class="cycle-arrow">→</span>
      <span class="cycle-step" style="color: var(--c-try); font-weight: bold;">! 尝试没过</span>
      <span class="cycle-arrow">→</span>
      <span class="cycle-step">· 未做</span>
    </div>

    <div class="cells" id="cells"></div>

    <div style="display:flex;gap:0.5em;margin-top:1em;flex-wrap:wrap;">
      <button class="btn tiny sec" id="fill-rest-o">剩余全标 O</button>
      <button class="btn tiny sec" id="clear-all">全部清除</button>
    </div>

    <div class="stat-grid">
      <div class="stat-cell">
        <div class="stat-label">赛时过题 + 补题</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">赛时过题</div>
        <div class="stat-value" id="stat-contest">0</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">总题数</div>
        <div class="stat-value" id="stat-problems">0</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label>比赛链接 <span class="hint">（选填）</span></label>
        <input type="text" id="link" placeholder="https://codeforces.com/gym/...">
      </div>
      <div>
        <label>标签 <span class="hint">（选填）</span></label>
        <input type="text" id="tags" placeholder="#icpc #regional #2024">
      </div>
    </div>
  </div>

  <h2>💾 保存修改</h2>
  <div class="card save-panel">
    <div class="nav-tip" id="save-mode-hint"></div>

    <div id="save-diff" style="display:none;">
      <label>原行（来自 <code>contests.csv</code>）</label>
      <div class="preview diff-old" id="diff-old"></div>
      <label style="margin-top: 0.8em;">新行（你的修改）</label>
      <div class="preview diff-new" id="diff-new"></div>
    </div>

    <div style="margin-top: 0.8em;">
      <label>新 CSV 行</label>
      <div class="preview" id="preview-csv"></div>
    </div>

    <div class="save-actions">
      <button class="btn primary" id="btn-save-github">💾 保存到 GitHub</button>
    </div>

    <details class="token-config" id="token-config">
      <summary>⚙ GitHub Token 配置</summary>
      <p class="hint" style="margin-top: 0.5em;">
        ① 打开 <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">GitHub PAT 设置</a>
        ② New fine-grained token，仓库只勾 <code>tarjen/tarjen-wiki</code>，权限只勾 <strong>Contents: Read and write</strong>
        ③ 复制 token 粘到下面
      </p>
      <input type="password" id="gh-token" placeholder="github_pat_xxx..." autocomplete="off">
      <div class="row" style="display: flex; gap: 0.5em; align-items: center;">
        <button class="btn sec tiny" id="btn-save-token">保存 Token</button>
        <button class="btn sec tiny" id="btn-clear-token" style="display:none;">清除</button>
        <span class="hint" id="token-status"></span>
      </div>
    </details>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var W = window.Wiki;
    var $ = function (id) { return document.getElementById(id); };
    // 状态：'.' (未做) / 'O' (赛时过题) / 'Ø' (赛后补过) / '!' (尝试没过)
    var CYCLE = ['.', 'O', 'Ø', '!'];
    var DISPLAY = { 'O': 'O', '.': '·', 'Ø': 'Ø', '!': '!' };
    var CLASS = { 'O': 's-O', '.': '', 'Ø': 's-fix', '!': 's-bang' };
    var LABELS = { 'O': '赛时过题', '.': '未做', 'Ø': '补过', '!': '尝试没过' };

    var cells = [];
    var existingSlugs = new Set();
    var csvRows = [];
    var csvHeader = [];
    var editingSlug = null;
    var saving = false;

    // ---------- utils ----------
    function slugify(s) {
      return (s || '').toLowerCase()
        .replace(/['']/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 60);
    }
    function clampInt(s, lo, hi, fb) {
      var n = parseInt(s, 10);
      if (isNaN(n)) return fb;
      return Math.max(lo, Math.min(hi, n));
    }
    function csvDateToInputValue(s) {
      var m = /^(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})$/.exec((s || '').trim());
      if (!m) return '';
      return m[1] + '-' + m[2].padStart(2, '0') + '-' + m[3].padStart(2, '0');
    }
    function csvEscape(v) {
      v = (v || '').toString();
      if (/[",\n\r]/.test(v)) return '"' + v.replace(/"/g, '""') + '"';
      return v;
    }

    // ---------- form ----------
    function getRow() {
      var total = clampInt($('total').value, 1, 26, 13);
      var problems = cells.slice(0, total).join(';');
      var solved = cells.filter(function (c) { return c === 'O' || c === 'Ø'; }).length;
      return {
        slug: $('slug').value.trim() || slugify($('name').value),
        name: $('name').value.trim(),
        date: ($('date').value || '').replace(/-/g, '.'),
        solved: solved,
        total: total,
        problems: problems,
        link: $('link').value.trim(),
        tags: $('tags').value.trim(),
      };
    }
    function csvRow(r) {
      return [r.slug, r.name, r.date, r.solved, r.total, r.problems, r.link, r.tags]
        .map(csvEscape).join(',');
    }
    function buildFullCsv() {
      var r = getRow();
      var header = 'slug,name,date,solved,total,problems,link,tags';
      if (csvRows.length === 0) return header + '\n' + csvRow(r) + '\n';
      var lines = csvRows.map(function (c) { return csvRow(c); });
      if (editingSlug) {
        var idx = csvRows.findIndex(function (c) { return c.slug === editingSlug; });
        if (idx >= 0) lines[idx] = csvRow(r);
        else lines.push(csvRow(r));
      } else {
        lines.push(csvRow(r));
      }
      return header + '\n' + lines.join('\n') + '\n';
    }

    // ---------- cells UI ----------
    function renderCells() {
      var total = clampInt($('total').value, 1, 26, 13);
      while (cells.length < total) cells.push('.');
      while (cells.length > total) cells.pop();
      var root = $('cells');
      root.innerHTML = '';
      cells.forEach(function (s, i) {
        var div = document.createElement('div');
        div.className = 'cell ' + CLASS[s];
        div.dataset.idx = i;
        var letter = String.fromCharCode(65 + i);
        div.innerHTML = '<span class="cell-label">' + letter + '</span>' + DISPLAY[s];
        div.title = letter + ': ' + LABELS[s];
        div.tabIndex = 0;
        div.addEventListener('click', function () { cycleCell(i); });
        div.addEventListener('keydown', function (e) {
          if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); cycleCell(i); }
          else if (e.key === 'ArrowRight' && i + 1 < cells.length) {
            e.preventDefault(); root.children[i + 1].focus();
          } else if (e.key === 'ArrowLeft' && i > 0) {
            e.preventDefault(); root.children[i - 1].focus();
          }
        });
        root.appendChild(div);
      });
    }
    function cycleCell(i) {
      var idx = CYCLE.indexOf(cells[i]);
      cells[i] = CYCLE[(idx + 1) % CYCLE.length];
      renderCells();
      updateAll();
    }

    // ---------- preview & save panel ----------
    function updateAll() {
      var r = getRow();
      $('solved').value = r.solved;
      var inContest = cells.filter(function (c) { return c === 'O'; }).length;
      var totalSolved = cells.filter(function (c) { return c === 'O' || c === 'Ø'; }).length;
      $('stat-total').textContent = totalSolved;
      $('stat-contest').textContent = inContest;
      $('stat-problems').textContent = r.total;

      var slugInput = $('slug');
      if (existingSlugs.has(r.slug) && r.slug !== editingSlug) {
        slugInput.style.borderColor = 'var(--c-try)';
        slugInput.title = '⚠ slug 已在 contests.csv 中存在';
      } else {
        slugInput.style.borderColor = '';
        slugInput.title = '';
      }
      renderSavePanel(r);
    }
    function renderSavePanel(r) {
      $('preview-csv').textContent = csvRow(r);
      if (editingSlug) {
        var old = csvRows.find(function (c) { return c.slug === editingSlug; });
        if (old) {
          $('diff-old').textContent = csvRow(old);
          $('diff-new').textContent = csvRow(r);
          $('save-diff').style.display = 'block';
          $('save-mode-hint').innerHTML =
            '编辑模式：正在改 <code>' + W.esc(editingSlug) + '</code>，下面会显示原行 vs 新行。';
          return;
        }
      }
      $('save-diff').style.display = 'none';
      $('save-mode-hint').innerHTML =
        '新增模式：填好之后点「💾 保存到 GitHub」直接提交到仓库。';
    }

    // ---------- load existing data ----------
    function loadContestsData(payload) {
      csvHeader = payload.header || [];
      csvRows = (payload.rows || []).map(function (r) {
        return {
          slug: r.slug || '',
          name: r.name || '',
          date: r.date || '',
          solved: r.solved != null ? String(r.solved) : '',
          total: r.total != null ? String(r.total) : '',
          problems: r.problems || '',
          link: r.link || '',
          tags: r.tags || '',
        };
      });
      ingestLoaded();
    }
    function ingestLoaded() {
      existingSlugs = new Set(csvRows.map(function (r) { return r.slug; }).filter(Boolean));
      var urlSlug = new URLSearchParams(location.search).get('slug');
      if (urlSlug) {
        if (existingSlugs.has(urlSlug)) {
          loadContestIntoForm(urlSlug);
        } else {
          W.toast('数据里找不到 slug=' + urlSlug, true);
          updateAll();
        }
      } else {
        updateAll();
      }
    }
    function loadContestIntoForm(slug) {
      var row = csvRows.find(function (r) { return r.slug === slug; });
      if (!row) { W.toast('找不到 slug=' + slug, true); return; }
      editingSlug = slug;
      $('name').value = row.name;
      $('slug').value = row.slug;
      $('slug').dataset.touched = '1';
      $('date').value = csvDateToInputValue(row.date || '');
      $('total').value = clampInt(row.total, 1, 26, 13);
      var probs = (row.problems || '').replace(/[;,]/g, '').split('').filter(Boolean);
      cells = probs.slice(0, 26);
      while (cells.length < 13) cells.push('.');
      $('link').value = row.link || '';
      $('tags').value = row.tags || '';
      $('edit-banner').style.display = 'block';
      $('editing-name').textContent = row.name + ' (' + row.slug + ')';
      renderCells();
      updateAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function exitEditMode() {
      editingSlug = null;
      $('edit-banner').style.display = 'none';
      clearForm();
    }
    function clearForm() {
      ['name', 'slug', 'link', 'tags'].forEach(function (id) { $(id).value = ''; });
      $('total').value = 13;
      $('solved').value = 0;
      $('date').value = '';
      cells = [];
      renderCells();
      updateAll();
    }

    // ---------- save ----------
    function isDirty() {
      // 简单判断：name/slug/date/total/link/tags 任一非空就算 dirty
      if (saving) return false;
      return $('name').value.trim() || $('slug').value.trim() || $('link').value.trim() || $('tags').value.trim()
        || cells.some(function (c) { return c !== '.'; });
    }

    async function saveToGithub() {
      if (!W.getToken()) {
        // 试一下输入框
        var v = $('gh-token').value.trim();
        if (v && v.indexOf('••') !== 0) { W.setToken(v); $('gh-token').value = '••••••••••'; }
      }
      if (!W.getToken()) {
        W.toast('先在「GitHub Token 配置」里填 PAT', true);
        var d = $('token-config'); if (d) { d.open = true; d.scrollIntoView(); }
        $('gh-token').focus();
        return;
      }
      var btn = $('btn-save-github');
      var orig = btn.textContent;
      btn.disabled = true; saving = true;
      btn.textContent = '⏳ 保存中…';

      try {
        var r = getRow();
        var msg = editingSlug ? 'update(' + editingSlug + '): via editor' : 'add(' + r.slug + '): via editor';
        await W.commitFile('contests.csv', buildFullCsv(), msg);
        btn.textContent = '✅ 已保存';
        W.toast('✅ 已提交到 GitHub');
        setTimeout(function () { btn.textContent = orig; btn.disabled = false; saving = false; }, 2500);
        setTimeout(function () { location.href = '../?_t=' + Date.now(); }, 4000);
      } catch (e) {
        W.toast('保存失败：' + e.message, true);
        btn.textContent = orig;
        btn.disabled = false;
        saving = false;
        updateAll();
      }
    }

    // ---------- init ----------
    var d = new Date();
    var pad = function (n) { return String(n).padStart(2, '0'); };
    $('date').value = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());

    ['name', 'slug', 'date', 'total', 'link', 'tags'].forEach(function (id) {
      $(id).addEventListener('input', function () {
        if (id === 'name' && !$('slug').dataset.touched) $('slug').value = slugify($('name').value);
        if (id === 'total') renderCells();
        updateAll();
      });
    });
    $('slug').addEventListener('input', function () { $('slug').dataset.touched = '1'; updateAll(); });

    $('fill-rest-o').addEventListener('click', function () {
      cells = cells.map(function (c) { return c === '.' ? 'O' : c; });
      renderCells(); updateAll();
    });
    $('clear-all').addEventListener('click', function () {
      cells = cells.map(function () { return '.'; });
      renderCells(); updateAll();
    });

    $('btn-save-github').addEventListener('click', saveToGithub);
    $('btn-exit-edit').addEventListener('click', exitEditMode);

    W.wireTokenUI();
    W.wireBeforeUnload(isDirty, saveToGithub);

    // 加载已有数据
    fetch('../data/contests.json', { cache: 'no-store' })
      .then(function (r) { return r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)); })
      .then(loadContestsData)
      .catch(function (e) { W.toast('加载失败：' + e.message + '（需要 dev server 或 gh-pages 部署）', true); });

    var urlSlug = new URLSearchParams(location.search).get('slug');
    if (urlSlug) {
      $('mode-banner').innerHTML =
        '<strong>📝 编辑模式：</strong>slug=<code>' + W.esc(urlSlug) + '</code>。' +
        '从 <code>data/contests.json</code> 自动加载中…';
    } else {
      $('mode-banner').innerHTML =
        '<strong>新增模式：</strong>填好之后点底部「💾 保存到 GitHub」直接提交。';
    }

    renderCells();
    updateAll();
  });
  </script>
</body>
</html>
