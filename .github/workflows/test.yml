name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 注意: fastapi/uvicorn 已不在 requirements.txt, 不依赖 mkdocs build 也能跑测试
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover tests/ -v 2>&1 | tail -50

      - name: Show wiki doctor (smoke test, may fail without config)
        shell: bash
        run: |
          # 在临时目录跑 doctor (不要在真实 ~/wiki 上跑)
          REPO_PATH="$(pwd)" CONFIG_DIR="$(pwd)/_test_config" \
            python -m tools.cli_main doctor || true