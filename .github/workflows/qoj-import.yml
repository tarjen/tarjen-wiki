name: QOJ import

# 通过浏览器「📥 从 QOJ 导入」按钮触发：editor → GitHub API → 这里 → tools/qoj_sync.py → 提交 cache 回 main
# 浏览器轮询 raw.githubusercontent.com 看到新数据后弹"导入预览"
on:
  workflow_dispatch:
    inputs:
      contest_id:
        description: 'QOJ contest id (e.g. 2564)'
        required: true
      username:
        description: 'QOJ username (e.g. tarjen)'
        required: true
    # cookie 走 secrets.QOJ_AUTH_COOKIE——加密 at rest，log 完全看不到；
    # 一次设置，所有 run 共用，cookie 过期了去 GH Settings 改一次。

permissions:
  contents: write

concurrency:
  group: qoj-import
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    # Playwright 安装 chromium ~150MB，10–13 题 × 2–3 页 = 1–3 min 抓取。
    # 单场最多 15 min（多题多提交翻页）。
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install qoj sync deps
        # playwright = Python 绑定；playwright install chromium 拉 Chromium 浏览器
        # 不装系统依赖（--with-deps）省时间；runner-images 通常够用
        # curl-cffi：解完 CF 后用 fake Chrome TLS 指纹跑剩下的 /submissions，
        #            cf_clearance 继续有效，单请求 ~300ms 而非 ~10s
        run: |
          pip install playwright curl-cffi
          playwright install chromium

      - name: Run QOJ sync
        env:
          CONTEST_ID: ${{ inputs.contest_id }}
          USERNAME: ${{ inputs.username }}
          # cookie 走 secret：加密 at rest，log 完全看不到（连 env 列表也是 ***）
          # 一次设置，所有 run 共用，cookie 过期了去 Repo Settings 改一次
          QOJ_AUTH_COOKIE: ${{ secrets.QOJ_AUTH_COOKIE }}
        run: |
          # ::add-mask:: 兜底（secret 本身已经自动 mask，这里写一下是显式意图）
          echo "::add-mask::$QOJ_AUTH_COOKIE"
          python3 tools/qoj_sync.py "$CONTEST_ID" "$USERNAME"
        # 不加 continue-on-error：失败要让下一部的 artifact 上传跑起来

      - name: Upload debug HTML on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qoj-debug-html
          path: |
            docs/data/qoj-debug-*.html
            docs/data/qoj-debug-*.png
          if-no-files-found: ignore

      - name: Commit cache back to main
        run: |
          git config user.name "qoj-sync-bot"
          git config user.email "qoj-sync-bot@users.noreply.github.com"
          git add docs/data/qoj-cache.json
          # 没有变化时 git diff --staged --quiet 返回 0，跳过 commit
          if ! git diff --staged --quiet; then
            git commit -m "qoj: import contest ${{ inputs.contest_id }} for ${{ inputs.username }}"
            git push
          fi
