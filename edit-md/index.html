<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑详情页 — Wiki</title>
  <link rel="stylesheet" href="../assets/wiki.css">
  <script src="../assets/wiki.js" defer></script>
  <script src="../assets/marked.min.js" defer></script>
  <style>
    /* 编辑器特有：左右双栏布局 */
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1em;
      min-height: 60vh;
    }
    @media (max-width: 900px) {
      .editor-grid { grid-template-columns: 1fr; }
    }
    .pane {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-header {
      padding: 0.5em 0.8em;
      background: var(--code-bg);
      font-size: 0.85em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }
    textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: vertical;
      padding: 1em;
      font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
      background: var(--card-bg);
      color: var(--fg);
      min-height: 50vh;
    }
    .preview { flex: 1; padding: 1em 1.2em; overflow-y: auto; font-size: 0.95em; }
    .preview h1, .preview h2, .preview h3, .preview h4 {
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.3em;
    }
    .preview h1 { font-size: 1.6em; }
    .preview h2 { font-size: 1.3em; }
    .preview h3 { font-size: 1.1em; }
    .preview code { font-size: 0.85em; }
    .preview pre {
      background: var(--code-bg);
      padding: 0.8em 1em;
      border-radius: 4px;
      overflow-x: auto;
    }
    .preview blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1em;
      color: var(--muted);
      margin-left: 0;
    }
    .preview table { border-collapse: collapse; margin: 0.5em 0; }
    .preview table th, .preview table td {
      border: 1px solid var(--border);
      padding: 0.4em 0.8em;
    }
    .preview a { color: var(--accent); }
    .preview ul, .preview ol { padding-left: 1.5em; }

    .toolbar {
      display: flex;
      gap: 0.5em;
      align-items: center;
      flex-wrap: wrap;
      margin: 1em 0;
      padding: 0.6em 0.8em;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
    }
    .toolbar .slug {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.85em;
      color: var(--muted);
      margin-right: auto;
    }
    .toolbar .slug strong { color: var(--fg); }
  </style>
</head>
<body>
  <h1>📝 编辑详情页</h1>
  <div class="nav-tip">
    左侧改 Markdown → 右侧实时预览 → 点 <strong>💾 保存到 GitHub</strong>（或 <code>Ctrl/⌘+S</code>），配了 GitHub Actions 几秒后页面自动更新
  </div>
  <div class="edit-banner" id="edit-banner" style="display:none;"></div>

  <div class="toolbar">
    <div class="slug">正在编辑：<strong id="slug-name">—</strong></div>
    <span class="status-pill" id="status-pill">未修改</span>
    <a class="btn sec" id="btn-goto" style="text-decoration:none;display:none;" target="_blank">👁 查看</a>
    <a class="btn sec" id="btn-status" style="text-decoration:none;" href="../editor/?">📊 改状态</a>
    <button class="btn primary" id="btn-save-github" disabled>💾 保存到 GitHub</button>
  </div>

  <div class="editor-grid">
    <div class="pane">
      <div class="pane-header">Markdown 源</div>
      <textarea id="md-content" spellcheck="false" placeholder="加载中..."></textarea>
    </div>
    <div class="pane">
      <div class="pane-header">实时预览</div>
      <div class="preview" id="md-preview"></div>
    </div>
  </div>

  <details class="token-config" id="token-config">
    <summary>⚙ GitHub Token 配置</summary>
    <p class="hint" style="margin-top: 0.5em;">
      ① 打开 <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">GitHub PAT 设置</a>
      ② New fine-grained token，仓库只勾 <code>tarjen/tarjen-wiki</code>，权限只勾 <strong>Contents: Read and write</strong>
      ③ 复制 token 粘到下面
    </p>
    <input type="password" id="gh-token" placeholder="github_pat_xxx..." autocomplete="off">
    <div class="row">
      <button class="btn sec tiny" id="btn-save-token">保存 Token</button>
      <button class="btn sec tiny" id="btn-clear-token" style="display:none;">清除</button>
      <span class="hint" id="token-status"></span>
    </div>
  </details>

  <div class="toast" id="toast"></div>

  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var W = window.Wiki;
    var $ = function (id) { return document.getElementById(id); };
    var params = new URLSearchParams(location.search);
    var slug = params.get('slug');
    var ta = $('md-content');
    var preview = $('md-preview');
    var original = '';
    var saving = false;

    function isDirty() { return ta.value !== original && !saving; }

    function updatePreview() {
      try {
        preview.innerHTML = window.marked
          ? window.marked.parse(ta.value)
          : '<pre>' + W.esc(ta.value) + '</pre>';
      } catch (e) {
        preview.innerHTML = '<pre>' + W.esc(ta.value) + '</pre>';
      }
      var dirty = isDirty();
      W.setStatus(dirty ? '● 未保存' : (original ? '✓ 未修改' : ''), dirty ? 'dirty' : 'saved');
      $('btn-save-github').disabled = !dirty || saving;
    }

    async function loadFile() {
      if (!slug) {
        ta.value = '# 在这里写\n\n没有任何 slug。\n';
        $('edit-banner').style.display = 'block';
        $('edit-banner').textContent = '⚠ URL 里没有 ?slug=xxx，没法自动加载。';
        $('slug-name').textContent = '(无 slug)';
        original = ta.value;
        updatePreview();
        return;
      }
      $('slug-name').textContent = slug;
      $('btn-goto').href = '../contests/' + encodeURIComponent(slug) + '/?_t=' + Date.now();
      $('btn-goto').style.display = '';

      // 多个源：dev server 直链 → raw.githubusercontent 兜底
      var sources = [
        '../docs/contests/' + encodeURIComponent(slug) + '.md',
        W.rawUrl('docs/contests/' + encodeURIComponent(slug) + '.md'),
      ];
      for (var i = 0; i < sources.length; i++) {
        try {
          var res = await fetch(sources[i], { cache: 'no-store' });
          if (!res.ok) continue;
          var text = await res.text();
          ta.value = text;
          original = text;
          updatePreview();
          W.setStatus('✓ 已加载', 'saved');
          return;
        } catch (e) { /* 试下一个源 */ }
      }
      ta.value = '# ' + slug + '\n\n（无法加载，请检查 slug）\n';
      original = ta.value;
      $('edit-banner').style.display = 'block';
      $('edit-banner').innerHTML = '⚠ 没法加载 <code>' + W.esc(slug) + '.md</code>，可能 file:// 协议或 slug 错。';
      updatePreview();
    }

    async function saveToGithub() {
      if (!slug) { W.toast('URL 里没有 ?slug=', true); return; }
      if (!W.getToken()) {
        W.toast('先在下方 ⚙ Token 配置 里填 token', true);
        var d = $('token-config'); if (d) { d.open = true; d.scrollIntoView(); }
        return;
      }
      var btn = $('btn-save-github');
      var orig = btn.textContent;
      btn.disabled = true; saving = true;
      btn.textContent = '⏳ 保存中…';

      try {
        await W.commitFile(
          'docs/contests/' + encodeURIComponent(slug) + '.md',
          ta.value,
          'update(' + slug + '): via markdown editor'
        );
        original = ta.value;
        W.setStatus('✅ 已保存', 'saved');
        W.toast('✅ 已提交到 GitHub');
        setTimeout(function () { btn.textContent = orig; saving = false; }, 1500);
        // 等几秒让 workflow 跑完再跳回比赛页（带 cache-bust）
        setTimeout(function () { location.href = '../contests/' + encodeURIComponent(slug) + '/?_t=' + Date.now(); }, 4000);
      } catch (e) {
        W.toast('保存失败：' + e.message, true);
        btn.textContent = orig; saving = false;
        updatePreview();
      }
    }

    ta.addEventListener('input', updatePreview);
    $('btn-save-github').addEventListener('click', saveToGithub);

    W.wireTokenUI();
    W.wireBeforeUnload(isDirty, saveToGithub);
    loadFile();
  });
  </script>
</body>
</html>
