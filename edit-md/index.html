<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑详情页 — Wiki</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --muted: #666;
      --accent: #3f51b5;
      --border: #e0e0e0;
      --code-bg: #f0f0f0;
      --card-bg: #fff;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --fg: #e0e0e0;
        --muted: #999;
        --accent: #7986cb;
        --border: #333;
        --code-bg: #2a2a2a;
        --card-bg: #242424;
        --shadow: 0 1px 3px rgba(0,0,0,0.4);
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--fg);
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5em;
      line-height: 1.55;
    }
    h1 { font-weight: 600; margin: 0 0 0.3em; font-size: 1.4em; }
    a { color: var(--accent); }
    code {
      font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
      background: var(--code-bg);
      padding: 0.1em 0.4em;
      border-radius: 3px;
      font-size: 0.92em;
    }
    .nav-tip {
      background: var(--code-bg);
      border-left: 3px solid var(--accent);
      padding: 0.8em 1em;
      margin-top: 0.5em;
      border-radius: 0 4px 4px 0;
      font-size: 0.92em;
    }
    .edit-banner {
      background: #fff3e0;
      color: #5d4037;
      border-left: 3px solid #ff9800;
      padding: 0.8em 1em;
      margin-top: 1em;
      border-radius: 0 4px 4px 0;
      font-size: 0.95em;
    }
    @media (prefers-color-scheme: dark) {
      .edit-banner { background: rgba(255, 152, 0, 0.15); color: #ffcc80; }
    }
    .toolbar {
      display: flex;
      gap: 0.5em;
      align-items: center;
      flex-wrap: wrap;
      margin: 1em 0;
      padding: 0.6em 0.8em;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
    }
    .toolbar .slug {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.85em;
      color: var(--muted);
      margin-right: auto;
    }
    .toolbar .slug strong { color: var(--fg); }

    button.btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5em 1em;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
      font-family: inherit;
    }
    button.btn:hover { opacity: 0.9; }
    button.btn.sec {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1em;
      min-height: 60vh;
    }
    @media (max-width: 900px) {
      .editor-grid { grid-template-columns: 1fr; }
    }
    .pane {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-header {
      padding: 0.5em 0.8em;
      background: var(--code-bg);
      font-size: 0.85em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }
    textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: vertical;
      padding: 1em;
      font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
      background: var(--card-bg);
      color: var(--fg);
      min-height: 50vh;
    }
    .preview {
      flex: 1;
      padding: 1em 1.2em;
      overflow-y: auto;
      font-size: 0.95em;
    }
    .preview h1, .preview h2, .preview h3, .preview h4 {
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.3em;
    }
    .preview h1 { font-size: 1.6em; }
    .preview h2 { font-size: 1.3em; }
    .preview h3 { font-size: 1.1em; }
    .preview code {
      font-size: 0.85em;
    }
    .preview pre {
      background: var(--code-bg);
      padding: 0.8em 1em;
      border-radius: 4px;
      overflow-x: auto;
    }
    .preview blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1em;
      color: var(--muted);
      margin-left: 0;
    }
    .preview table {
      border-collapse: collapse;
      margin: 0.5em 0;
    }
    .preview table th, .preview table td {
      border: 1px solid var(--border);
      padding: 0.4em 0.8em;
    }
    .preview a { color: var(--accent); }
    .preview ul, .preview ol { padding-left: 1.5em; }

    .toast {
      position: fixed;
      bottom: 2em;
      left: 50%;
      transform: translateX(-50%);
      background: var(--fg);
      color: var(--bg);
      padding: 0.6em 1.2em;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 0.95; }
    .toast.error { background: #f44336; color: white; }

    .status-pill {
      display: inline-block;
      padding: 0.15em 0.6em;
      border-radius: 12px;
      font-size: 0.8em;
      background: var(--code-bg);
      color: var(--muted);
    }
    .status-pill.dirty { background: #fff3e0; color: #ff9800; }
    .status-pill.saved { background: #e8f5e9; color: #4caf50; }
  </style>
</head>
<body>
  <h1>📝 编辑详情页</h1>
  <div class="nav-tip">
    左侧改 Markdown → 右侧实时预览 → 复制或下载回去手动替换 <code>docs/contests/&lt;slug&gt;.md</code>
  </div>
  <div class="edit-banner" id="edit-banner" style="display:none;"></div>

  <div class="toolbar">
    <div class="slug">正在编辑：<strong id="slug-name">—</strong></div>
    <span class="status-pill" id="status-pill">未修改</span>
    <button class="btn sec" id="btn-copy">📋 复制</button>
    <button class="btn sec" id="btn-download">⬇ 下载 .md</button>
    <a class="btn sec" id="btn-goto" style="text-decoration:none;display:none;" target="_blank">👁 查看</a>
    <a class="btn sec" id="btn-status" style="text-decoration:none;">📊 改状态</a>
  </div>

  <div class="editor-grid">
    <div class="pane">
      <div class="pane-header">Markdown 源</div>
      <textarea id="md-content" spellcheck="false" placeholder="加载中..."></textarea>
    </div>
    <div class="pane">
      <div class="pane-header">实时预览</div>
      <div class="preview" id="md-preview"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug');
    const tab = params.get('tab') || 'md';
    const ta = $('md-content');
    const preview = $('md-preview');
    let original = '';
    let dirty = false;

    // 配置 marked
    if (window.marked) {
      marked.setOptions({ breaks: true, gfm: true });
    }

    function setStatus(text, cls) {
      const el = $('status-pill');
      el.textContent = text;
      el.className = 'status-pill' + (cls ? ' ' + cls : '');
    }

    function updatePreview() {
      try {
        preview.innerHTML = window.marked ? marked.parse(ta.value) : '<pre>' + escapeHtml(ta.value) + '</pre>';
      } catch (e) {
        preview.innerHTML = '<pre>' + escapeHtml(ta.value) + '</pre>';
      }
      dirty = ta.value !== original;
      setStatus(dirty ? '● 未保存' : '✓ 未修改', dirty ? 'dirty' : 'saved');
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    async function loadFile() {
      if (!slug) {
        ta.value = '# 在这里写\n\n没有任何 slug。\n';
        $('edit-banner').style.display = 'block';
        $('edit-banner').textContent = '⚠ URL 里没有 ?slug=xxx，没法自动加载。';
        $('slug-name').textContent = '(无 slug)';
        original = ta.value;
        updatePreview();
        return;
      }
      $('slug-name').textContent = slug;
      $('btn-goto').href = `../contests/${slug}/`;
      $('btn-goto').style.display = '';
      $('btn-status').href = `../editor/?slug=${encodeURIComponent(slug)}`;

      // 尝试多个源，按顺序试：
      // 1. 同源 ../docs/contests/<slug>.md — dev server (mkdocs serve) 模式下可用
      // 2. raw.githubusercontent.com — gh-pages 部署模式下可用（CORS *）
      const sources = [
        `../docs/contests/${slug}.md`,
        `https://raw.githubusercontent.com/tarjen/tarjen-wiki/main/docs/contests/${slug}.md`,
      ];
      for (const url of sources) {
        try {
          const res = await fetch(url);
          if (!res.ok) continue;
          const text = await res.text();
          ta.value = text;
          original = text;
          updatePreview();
          setStatus('✓ 已加载', 'saved');
          return;
        } catch (e) { /* 试下一个源 */ }
      }
      // 全部失败 → 降级为提示用户从文件选
      }
      // 降级：让用户选文件
      ta.value = `# ${slug}\n\n（无法从同源加载，请点下方按钮选 .md 文件）`;
      original = ta.value;
      $('edit-banner').style.display = 'block';
      $('edit-banner').innerHTML =
        `⚠ 没法从同源加载 <code>contests/${escapeHtml(slug)}.md</code>。` +
        `可能原因：<code>file://</code> 协议 / 路径错。` +
        `点这里 <a href="#" id="pick-file">选 .md 文件</a> 加载。`;
      $('pick-file').addEventListener('click', (e) => {
        e.preventDefault();
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = '.md';
        inp.onchange = () => {
          const f = inp.files[0];
          if (!f) return;
          const r = new FileReader();
          r.onload = () => {
            ta.value = r.result;
            original = r.result;
            updatePreview();
            setStatus('✓ 已加载', 'saved');
            $('edit-banner').style.display = 'none';
          };
          r.readAsText(f, 'utf-8');
        };
        inp.click();
      });
      updatePreview();
    }

    async function copyMd() {
      try {
        await navigator.clipboard.writeText(ta.value);
        showToast('已复制');
      } catch {
        ta.select();
        document.execCommand('copy');
        showToast('已复制（兼容模式）');
        window.getSelection().removeAllRanges();
      }
    }

    function downloadMd() {
      const blob = new Blob([ta.value], { type: 'text/markdown;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${slug || 'untitled'}.md`;
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('已下载');
    }

    function showToast(msg, isError) {
      const t = $('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.className = 'toast', 1800);
    }

    // 离开提示
    window.addEventListener('beforeunload', (e) => {
      if (dirty) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // 快捷键
    ta.addEventListener('input', updatePreview);
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        downloadMd();
      }
    });

    $('btn-copy').addEventListener('click', copyMd);
    $('btn-download').addEventListener('click', downloadMd);

    loadFile();
  </script>
</body>
</html>
